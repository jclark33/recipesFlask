<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" type="text/css" href="/style.css">
        <link rel="shortcut icon" href="{{ url_for('static', filename='leaf.ico') }}">

        <title>Julia's Recipe Box</title>

        <nav class="navbar navbar-inverse">

                <div class="navbar-header">
                <img src="{{ url_for('static', filename='icon.png') }}">
                <a class="navbar-brand" href="/">Home</a>
                <a class="navbar-brand" href="/addnew">Add Recipe</a>
                <a class="navbar-brand" href="/menu">View Menu</a>
                </div>

        </nav>
    </head>
    <body>
        <div class="container">

        <div class="row">
            <big><b>Your recipe results:</b></big>
        </div><br>

        {% for ingredient in ingredients %}
        <div class="row">
            &emsp;&emsp;<i>{{ ingredient.recipe.name }}</i>&emsp;<small>uses&nbsp;{{ ingredient.amount }}&nbsp;{{ ingredient.unit }}&nbsp;{{ ingredient.name }}</small>
        </div>
        {% endfor %}
        <br>

        <div class="row"><form action="/results" method="POST">
            <label for="name">Recipe:</label>&emsp;<input type="text" name="name" id="name">
            <input type="submit" class="btn btn-success" value = "Add to menu">
        </form></div>





    </div><!-- /.container -->
    </body>
</html>
