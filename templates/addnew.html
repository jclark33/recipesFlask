<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css" integrity="sha512-dTfge/zgoMYpP7QbHy4gWMEGsbsdZeCXz7irItjcC3sPUFtf0kuFbDz/ixG7ArTxmDjLXDmezHubeNikyKGVyQ==" crossorigin="anonymous">

        <title>Add a new recipe</title>
    </head>

    <body>
        <nav class="navbar navbar-inverse">
            <div class="container">
                <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="https://jclark33.pythonanywhere.com">Home</a>
                <a class="navbar-brand" href="#">Add Recipe</a>
                </div>
            </div>
        </nav>
        <div class="container">

            <div class="row">
               Enter your new recipe.
            </div>


        <div class="row">
            <form action='/addnew' method="POST">

                <label for="name">Recipe Name:</label>
                <input type="text" id="name" name="name"><br><br>

                <label for="description">Description:</label>
                <textarea id="description" name="description" placeholder="What makes this meal good?"></textarea><br><br>


                <label for="steps">Directions:</label>
                <textarea id="steps" name="steps" placeholder="Don't forget to preheat..."></textarea><br><br>

                <label for="ing">Amounts:</label>
                <label for="ingu">&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;Units:</label>
                <label for="ingn">&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;Ingredients:</label><br>

                <input type="number" id="ing" name="ing"><input type="text" id="ingu" name="ingu"><input type="text" id="ingn" name="ingn"><br>
                <input type="number" id="ing1" name="ing1"><input type="text" id="ingu1" name="ingu1"><input type="text" id="ingn1" name="ingn1"><br>
                <input type="number" id="ing2" name="ing2"><input type="text" id="ingu2" name="ingu2"><input type="text" id="ingn2" name="ingn2"><br>
                <input type="number" id="ing3" name="ing3"><input type="text" id="ingu3" name="ingu3"><input type="text" id="ingn3" name="ingn3"><br>
                <input type="number" id="ing4" name="ing4"><input type="text" id="ingu4" name="ingu4"><input type="text" id="ingn4" name="ingn4"><br>
                <input type="number" id="ing5" name="ing5"><input type="text" id="ingu5" name="ingu5"><input type="text" id="ingn5" name="ingn5"><br>
                <input type="number" id="ing6" name="ing6"><input type="text" id="ingu6" name="ingu6"><input type="text" id="ingn6" name="ingn6"><br>
                <input type="number" id="ing7" name="ing7"><input type="text" id="ingu7" name="ingu7"><input type="text" id="ingn7" name="ingn7"><br>
                <input type="number" id="ing8" name="ing8"><input type="text" id="ingu8" name="ingu8"><input type="text" id="ingn8" name="ingn8"><br>
                <input type="number" id="ing9" name="ing9"><input type="text" id="ingu9" name="ingu9"><input type="text" id="ingn9" name="ingn9"><br>
                <input type="number" id="ing0" name="ing0"><input type="text" id="ingu0" name="ingu0"><input type="text" id="ingn0" name="ingn0"><br><br>


                <input type="submit" class="btn btn-success" value="Add">
            </form>
        </div>
    </div><!-- /.container -->
    </body>
</html>
